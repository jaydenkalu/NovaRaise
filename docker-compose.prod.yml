version: '3.9'
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    env_file: ./backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "80:80"
    depends_on: [backend]
    restart: unless-stopped
